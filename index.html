<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SakuPribadi - Budgeting App Estetik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="login-page" class="page-container">
        <div class="login-card">
            <h1>Saku<span>Pribadi</span></h1>
            <p>Atur anggaran bulanan lebih rapi. Data 100% aman dan privat di Google Drive kamu sendiri.</p>
            
            <button id="btn-login-google" class="btn-primary">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                Masuk dengan Google
            </button>
        </div>
    </section>

    <section id="dashboard-page" class="page-container hidden">
        <header>
            <h2>Halo, Selamat Datang!</h2>
            <button id="btn-logout" class="btn-secondary">Keluar</button>
        </header>

        <main class="dashboard-content">
            <p>Wah, kamu berhasil masuk! Nanti dashboard budgeting-mu ada di sini.</p>
        </main>
    </section>

    <script src="app.js"></script>
</body>
</html>
